AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  EC2 host running PostgreSQL + Apache Superset (Feature 4 visualization layer).
  Free-tier friendly: single t3.micro in a public subnet, Docker Compose via UserData,
  shell access via SSM Session Manager only.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-computing-prj
  Environment:
    Type: String
    Default: dev
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
    Description: Free-tier eligible instance type (use t2.micro where t3.micro is not free).
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Resolves to the latest Amazon Linux 2023 AMI for the region.
  DbCredentialsParameterName:
    Type: String
    AllowedPattern: /.+
    Description: >-
      SSM SecureString parameter holding a JSON object with keys db_username,
      db_password, superset_admin_username, superset_admin_password, superset_secret_key.
  RootVolumeSizeGb:
    Type: Number
    Default: 30
    MinValue: 8
    MaxValue: 30
    Description: Root EBS volume size in GiB (<=30 stays within the free-tier allowance).
  ComposeVersion:
    Type: String
    Default: v2.29.2
    Description: Docker Compose plugin release tag to install.
  SupersetImage:
    Type: String
    Default: apache/superset:3.1.3
  PostgresImage:
    Type: String
    Default: postgres:16

Resources:
  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub ${ProjectName}-${Environment}-ec2-read-db-credentials
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbCredentialsParameterName}
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ProjectName}-${Environment}-ec2-profile
      Roles:
        - !Ref Ec2InstanceRole

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Select
        - 0
        - !Split
          - ','
          - !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-PublicSubnetIds
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: ${ProjectName}-${Environment}-Ec2InstanceSecurityGroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSizeGb
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-viz
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # --- Install Docker + Compose plugin ---
          dnf update -y
          dnf install -y docker jq
          systemctl enable --now docker
          mkdir -p /usr/libexec/docker/cli-plugins
          curl -sSL "https://github.com/docker/compose/releases/download/${ComposeVersion}/docker-compose-linux-x86_64" \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose

          mkdir -p /opt/app
          cd /opt/app

          # --- Fetch DB + Superset credentials from SSM SecureString ---
          CREDS_JSON="$(aws ssm get-parameter --name '${DbCredentialsParameterName}' --with-decryption --region '${AWS::Region}' --query 'Parameter.Value' --output text)"
          DB_USERNAME="$(printf '%s' "${!CREDS_JSON}" | jq -r .db_username)"
          DB_PASSWORD="$(printf '%s' "${!CREDS_JSON}" | jq -r .db_password)"
          SUPERSET_ADMIN_USERNAME="$(printf '%s' "${!CREDS_JSON}" | jq -r .superset_admin_username)"
          SUPERSET_ADMIN_PASSWORD="$(printf '%s' "${!CREDS_JSON}" | jq -r .superset_admin_password)"
          SUPERSET_SECRET_KEY="$(printf '%s' "${!CREDS_JSON}" | jq -r .superset_secret_key)"

          # --- Env file consumed by docker compose (kept off the world) ---
          umask 077
          cat > /opt/app/.env <<EOF
          DB_USERNAME=${!DB_USERNAME}
          DB_PASSWORD=${!DB_PASSWORD}
          SUPERSET_SECRET_KEY=${!SUPERSET_SECRET_KEY}
          EOF
          umask 022

          # --- Create the superset metadata DB alongside the metrics DB on first boot ---
          cat > /opt/app/init-superset-db.sql <<'EOF'
          CREATE DATABASE superset;
          EOF

          # --- Compose stack: one Postgres (metrics + superset DBs) and Superset on 8088 ---
          cat > /opt/app/docker-compose.yml <<'EOF'
          services:
            postgres:
              image: ${PostgresImage}
              restart: always
              environment:
                POSTGRES_USER: ${!DB_USERNAME}
                POSTGRES_PASSWORD: ${!DB_PASSWORD}
                POSTGRES_DB: metrics
              volumes:
                - pgdata:/var/lib/postgresql/data
                - ./init-superset-db.sql:/docker-entrypoint-initdb.d/init-superset-db.sql:ro
              ports:
                - "5432:5432"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${!DB_USERNAME} -d metrics"]
                interval: 10s
                timeout: 5s
                retries: 10
            superset:
              image: ${SupersetImage}
              restart: always
              depends_on:
                postgres:
                  condition: service_healthy
              environment:
                SUPERSET_SECRET_KEY: ${!SUPERSET_SECRET_KEY}
                SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${!DB_USERNAME}:${!DB_PASSWORD}@postgres:5432/superset
              ports:
                - "8088:8088"
          volumes:
            pgdata:
          EOF

          # --- Launch and bootstrap Superset ---
          docker compose up -d

          # Wait for the Superset container to accept exec, then initialise metadata + admin.
          for i in $(seq 1 30); do
            if docker compose exec -T superset superset db upgrade; then
              break
            fi
            sleep 10
          done
          docker compose exec -T superset superset fab create-admin \
            --username "${!SUPERSET_ADMIN_USERNAME}" \
            --firstname Admin --lastname User \
            --email admin@example.com \
            --password "${!SUPERSET_ADMIN_PASSWORD}" || true
          docker compose exec -T superset superset init

Outputs:
  Ec2InstanceId:
    Value: !Ref Ec2Instance
    Export:
      Name: !Sub ${ProjectName}-${Environment}-Ec2InstanceId
  Ec2PrivateIp:
    Description: Private IP used by the loader Lambda as the PostgreSQL host.
    Value: !GetAtt Ec2Instance.PrivateIp
    Export:
      Name: !Sub ${ProjectName}-${Environment}-Ec2PrivateIp
  Ec2PublicIp:
    Description: Public IP for the Superset UI (http://<ip>:8088).
    Value: !GetAtt Ec2Instance.PublicIp
    Export:
      Name: !Sub ${ProjectName}-${Environment}-Ec2PublicIp
  SupersetUrl:
    Value: !Sub http://${Ec2Instance.PublicIp}:8088

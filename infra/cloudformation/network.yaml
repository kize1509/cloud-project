AWSTemplateFormatVersion: '2010-09-09'
Description: Network foundation for the cloud-computing-prj data lake.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-computing-prj
  Environment:
    Type: String
    Default: dev
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  EnableNatGateway:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to true only when private subnets need outbound internet access.
  AllowedAdminCidr:
    Type: String
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    Description: >-
      CIDR allowed to reach the Superset UI (TCP 8088) on the EC2 instance.
      Must be supplied explicitly (e.g. your-ip/32) to keep least privilege.

Conditions:
  CreateNatGateway: !Equals [!Ref EnableNatGateway, 'true']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-vpc
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-b

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-a

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  NatEip:
    Type: AWS::EC2::EIP
    Condition: CreateNatGateway
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateNatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-nat

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-private-rt

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Condition: CreateNatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      VpcId: !Ref Vpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      RouteTableIds:
        - !Ref PrivateRouteTable
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-s3-endpoint

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group reserved for future private bronze processing.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-lambda-sg

  # Security group for the EC2 host running PostgreSQL + Apache Superset (Feature 4).
  # Shell access is via SSM Session Manager only, so no SSH (22) ingress.
  Ec2InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL + Superset host; Superset UI from admins, Postgres from loader Lambda only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: Superset UI from the admin CIDR.
          IpProtocol: tcp
          FromPort: 8088
          ToPort: 8088
          CidrIp: !Ref AllowedAdminCidr
      SecurityGroupEgress:
        - Description: Outbound for Docker image and package pulls.
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ec2-sg

  # Security group for the gold->PostgreSQL loader Lambda (Feature 4/7).
  # No ingress; egress limited to PostgreSQL (to the EC2 SG) and HTTPS (S3 gateway endpoint).
  LoaderLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Gold-to-PostgreSQL loader Lambda; egress limited to Postgres and HTTPS.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - Description: HTTPS to S3 via the gateway endpoint.
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-loader-lambda-sg

  # The two PostgreSQL (5432) rules reference each other's SG, so they are declared
  # as standalone resources to avoid a circular dependency between the SGs above.
  Ec2PostgresIngressFromLoader:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: PostgreSQL from the loader Lambda security group only.
      GroupId: !Ref Ec2InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LoaderLambdaSecurityGroup

  LoaderPostgresEgressToEc2:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: PostgreSQL to the EC2 instance security group.
      GroupId: !Ref LoaderLambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref Ec2InstanceSecurityGroup

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub ${ProjectName}-${Environment}-VpcId
  PublicSubnetIds:
    Value: !Join [',', [!Ref PublicSubnetA, !Ref PublicSubnetB]]
    Export:
      Name: !Sub ${ProjectName}-${Environment}-PublicSubnetIds
  PrivateSubnetIds:
    Value: !Join [',', [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]
    Export:
      Name: !Sub ${ProjectName}-${Environment}-PrivateSubnetIds
  LambdaSecurityGroupId:
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-LambdaSecurityGroupId
  Ec2InstanceSecurityGroupId:
    Value: !Ref Ec2InstanceSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-Ec2InstanceSecurityGroupId
  LoaderLambdaSecurityGroupId:
    Value: !Ref LoaderLambdaSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-LoaderLambdaSecurityGroupId

